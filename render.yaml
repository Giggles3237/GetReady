services:
  - type: web
    name: get-ready-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: getready
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "true"
      - key: PORT
        value: "4000"
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_TTL_DAYS
        value: "90"
      - key: CORS_ORIGIN
        sync: false
